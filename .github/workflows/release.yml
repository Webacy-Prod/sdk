name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      published: ${{ steps.check.outputs.skip == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/sdk/package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if all packages already published
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGES=("@webacy-xyz/sdk-core" "@webacy-xyz/sdk-threat" "@webacy-xyz/sdk-trading" "@webacy-xyz/sdk" "@webacy-xyz/cli")
          ALL_PUBLISHED=true

          for pkg in "${PACKAGES[@]}"; do
            if npm view "${pkg}@${VERSION}" version 2>/dev/null; then
              echo "✓ ${pkg}@${VERSION} already published"
            else
              echo "✗ ${pkg}@${VERSION} not published"
              ALL_PUBLISHED=false
            fi
          done

          if [ "$ALL_PUBLISHED" = true ]; then
            echo "All packages at version ${VERSION} already published, skipping..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version ${VERSION}"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: pnpm build

      - name: Publish all packages
        if: steps.check.outputs.skip == 'false'
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish
    if: needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          name: v${{ needs.publish.outputs.version }}
          generate_release_notes: true
