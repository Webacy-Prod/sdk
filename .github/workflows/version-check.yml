name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from PR
        id: pr_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get version from main
        id: main_version
        run: |
          git fetch origin main
          git checkout origin/main -- package.json
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          git checkout HEAD -- package.json

      - name: Compare versions
        run: |
          if [ "${{ steps.pr_version.outputs.version }}" == "${{ steps.main_version.outputs.version }}" ]; then
            echo "❌ Version has not been bumped!"
            echo "Current version on main: ${{ steps.main_version.outputs.version }}"
            echo "Please bump the version in package.json before merging."
            exit 1
          fi
          echo "✅ Version bumped: ${{ steps.main_version.outputs.version }} → ${{ steps.pr_version.outputs.version }}"
