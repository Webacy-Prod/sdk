name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from PR
        id: pr_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get version from main
        id: main_version
        run: |
          git fetch origin main
          git checkout origin/main -- package.json
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          git checkout HEAD -- package.json

      - name: Compare versions (semver)
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"
          MAIN_VERSION="${{ steps.main_version.outputs.version }}"

          echo "Main version: $MAIN_VERSION"
          echo "PR version:   $PR_VERSION"

          # Semver comparison using node
          RESULT=$(node -e "
            const pr = '$PR_VERSION'.split('.').map(Number);
            const main = '$MAIN_VERSION'.split('.').map(Number);
            for (let i = 0; i < 3; i++) {
              if (pr[i] > main[i]) { console.log('greater'); process.exit(0); }
              if (pr[i] < main[i]) { console.log('less'); process.exit(0); }
            }
            console.log('equal');
          ")

          if [ "$RESULT" == "greater" ]; then
            echo "✅ Version bumped: $MAIN_VERSION → $PR_VERSION"
          elif [ "$RESULT" == "equal" ]; then
            echo "❌ Version has not been bumped!"
            echo "Current version on main: $MAIN_VERSION"
            echo "Please bump the version in package.json before merging."
            exit 1
          else
            echo "❌ Version downgrade detected!"
            echo "Main version: $MAIN_VERSION"
            echo "PR version:   $PR_VERSION"
            echo "PR version must be greater than main version."
            exit 1
          fi
