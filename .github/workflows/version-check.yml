name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from PR
        id: pr_version
        run: |
          # Use packages/sdk as source of truth (unified versioning)
          echo "version=$(node -p "require('./packages/sdk/package.json').version")" >> $GITHUB_OUTPUT

      - name: Get version from main
        id: main_version
        run: |
          git fetch origin main
          # Check if file exists on main (handles initial release)
          if git cat-file -e origin/main:packages/sdk/package.json 2>/dev/null; then
            git checkout origin/main -- packages/sdk/package.json
            echo "version=$(node -p "require('./packages/sdk/package.json').version")" >> $GITHUB_OUTPUT
            git checkout HEAD -- packages/sdk/package.json
          else
            echo "ℹ️ No version found on main (initial release)"
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Compare versions (semver)
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"
          MAIN_VERSION="${{ steps.main_version.outputs.version }}"

          echo "Main version: $MAIN_VERSION"
          echo "PR version:   $PR_VERSION"

          # Semver comparison using node (handles prerelease versions)
          RESULT=$(node -e "
            // Strip prerelease suffix for base version comparison
            const stripPrerelease = (v) => v.replace(/-.+$/, '');
            const pr = stripPrerelease('$PR_VERSION').split('.').map(Number);
            const main = stripPrerelease('$MAIN_VERSION').split('.').map(Number);

            // Compare base versions
            for (let i = 0; i < 3; i++) {
              if (pr[i] > main[i]) { console.log('greater'); process.exit(0); }
              if (pr[i] < main[i]) { console.log('less'); process.exit(0); }
            }

            // Base versions equal - check prerelease
            const prHasPrerelease = '$PR_VERSION'.includes('-');
            const mainHasPrerelease = '$MAIN_VERSION'.includes('-');

            // Stable version > prerelease of same base
            if (!prHasPrerelease && mainHasPrerelease) {
              console.log('greater');
            } else {
              console.log('equal');
            }
          ")

          if [ "$RESULT" == "greater" ]; then
            echo "✅ Version bumped: $MAIN_VERSION → $PR_VERSION"
          elif [ "$RESULT" == "equal" ]; then
            echo "❌ Version has not been bumped!"
            echo "Current version on main: $MAIN_VERSION"
            echo "Please bump the version in all packages before merging."
            echo ""
            echo "Run: pnpm version:patch (or version:minor / version:major)"
            exit 1
          else
            echo "❌ Version downgrade detected!"
            echo "Main version: $MAIN_VERSION"
            echo "PR version:   $PR_VERSION"
            echo "PR version must be greater than main version."
            exit 1
          fi
