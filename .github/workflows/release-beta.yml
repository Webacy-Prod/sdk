name: Release Beta

on:
  push:
    branches: [staging]
    tags:
      - 'beta-*'

concurrency:
  group: release-beta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  publish-beta:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Get base version and compute beta version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT

          # Find next available beta number
          BETA_NUM=0
          while npm view "@webacy-xyz/sdk@${BASE_VERSION}-beta.${BETA_NUM}" version 2>/dev/null; do
            BETA_NUM=$((BETA_NUM + 1))
          done

          BETA_VERSION="${BASE_VERSION}-beta.${BETA_NUM}"
          echo "beta_version=${BETA_VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing beta version: ${BETA_VERSION}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Update package versions for beta
        run: |
          BETA_VERSION="${{ steps.version.outputs.beta_version }}"
          # Update all package.json files to beta version
          for pkg in packages/core packages/threat packages/trading packages/sdk packages/cli; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('${pkg}/package.json'));
              pkg.version = '${BETA_VERSION}';
              // Update internal dependencies
              for (const dep of ['@webacy-xyz/sdk-core', '@webacy-xyz/sdk-threat', '@webacy-xyz/sdk-trading']) {
                if (pkg.dependencies?.[dep]) pkg.dependencies[dep] = '${BETA_VERSION}';
                if (pkg.peerDependencies?.[dep]) pkg.peerDependencies[dep] = '${BETA_VERSION}';
              }
              fs.writeFileSync('${pkg}/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          echo "Updated all packages to ${BETA_VERSION}"

      - name: Publish all packages (beta)
        run: pnpm publish -r --access public --no-git-checks --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output beta version
        run: |
          echo "::notice::Published beta version ${{ steps.version.outputs.beta_version }}"
          echo "Install with: npm install @webacy-xyz/sdk@${{ steps.version.outputs.beta_version }}"
