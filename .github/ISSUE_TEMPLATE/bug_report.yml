name: Bug Report
description: Report a bug in the Webacy SDK
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@webacy-xyz/sdk"
        - "@webacy-xyz/sdk-core"
        - "@webacy-xyz/sdk-threat"
        - "@webacy-xyz/sdk-trading"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "1.3.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "20.x"
    validations:
      required: true
  - type: dropdown
    id: module-system
    attributes:
      label: Module System
      options:
        - ESM
        - CommonJS
        - Both
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true
